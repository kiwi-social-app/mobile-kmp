androidx-material-icons-extended = { group = "androidx.compose.material", name = "material-icons-extended", version.ref = "androidx-material-icons" }

firebase-app = { module = "dev.gitlive:firebase-app", version.ref = "firebase-kmp" }
firebase-auth = { module = "dev.gitlive:firebase-auth", version.ref = "firebase-kmp" }
firebase-bom = { module = "com.google.firebase:firebase-bom", version.ref = "firebase-bom" }
firebase-common = { module = "dev.gitlive:firebase-common", version.ref = "firebase-kmp" }


googleid = { module = "com.google.android.libraries.identity.googleid:googleid", version.ref = "googleid" }
