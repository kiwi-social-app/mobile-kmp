[versions]
agp = "8.13.2"
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
androidx-activityCompose = "1.13.0"
androidx-lifecycle = "2.10.0"
androidx-material-icons = "1.7.8"
credentials = "1.6.0"
firebase-bom = "34.12.0"
compose-multiplatform = "1.10.3"

firebase-kmp = "2.4.0"

google-services = "4.4.4"
googleid = "1.2.0"
kotlinxSerializationProtobuf = "1.11.0"
krossbowWebsocketBuiltin = "9.3.0"
skie = "0.10.11"

kotlin = "2.3.20"
kotlinSerialization = "2.3.20"
